<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; worker-src 'self' blob:;">
  <title>Notepad++ Mac</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Tab Bar -->
  <div id="tab-bar">
    <div id="traffic-light-spacer"></div>
    <div id="tabs-container"></div>
    <button id="new-tab-btn" title="New Tab">+</button>
  </div>

  <!-- Editor Container -->
  <div id="editor-container"></div>

  <!-- Status Bar -->
  <div id="status-bar">
    <span id="status-position">Ln 1, Col 1</span>
    <span id="status-selection"></span>
    <span id="status-language">Plain Text</span>
    <span id="status-encoding">UTF-8</span>
    <span id="status-eol">LF</span>
    <span id="status-indent">Spaces: 4</span>
  </div>

  <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
